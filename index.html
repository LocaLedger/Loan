<style>
/* ── Suite Drum ───────────────────────────────────────── */
.suite-drum-wrap {
  height: 44px; overflow: hidden; display: inline-block; vertical-align: middle;
  position: relative;
  -webkit-mask-image: linear-gradient(to bottom, transparent 0%, #000 22%, #000 78%, transparent 100%);
  mask-image:         linear-gradient(to bottom, transparent 0%, #000 22%, #000 78%, transparent 100%);
}
.suite-drum { position: relative; transition: transform 0.6s cubic-bezier(0.22,1,0.36,1); will-change: transform; transform-origin: center; }
#suiteLaunchBtn { transition: transform 0.12s ease; }
#suiteLaunchBtn:active { transform: scale(0.97); }
.suite-face { display: block; height: 44px; line-height: 44px; white-space: nowrap;
  font-family: 'Space Mono','Courier New',monospace; font-size: 28px; font-weight: 700; color: #F97316; }

/* ── Suite Launcher Panel ─────────────────────────────── */
#suiteLauncher {
  background: rgba(15,17,26,0.97);
  border-bottom: 1px solid rgba(249,115,22,0.18);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.suite-module-btn {
  display: flex; align-items: center; gap: 10px; padding: 10px 12px;
  border-radius: 10px; border: 1px solid transparent;
  background: rgba(255,255,255,0.03); cursor: pointer;
  transition: background 0.15s, border-color 0.15s, transform 0.1s;
  text-align: left; width: 100%;
}
.suite-module-btn:active { transform: scale(0.97); }
.suite-module-btn.active { background: rgba(249,115,22,0.14); border-color: rgba(249,115,22,0.38); }
.suite-module-btn:not(.active):hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.08); }
.suite-module-icon { width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

/* ── Floating Labels ──────────────────────────────────── */
.float-wrap { position: relative; }
.float-input {
  width: 100%; padding: 20px 12px 8px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px; color: #f1f5f9;
  font-family: 'Space Mono',monospace; font-size: 14px;
  transition: border-color 0.15s;
  -webkit-appearance: none; appearance: none;
}
.float-input:focus { outline: none; border-color: #F97316; }
.float-label {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  font-size: 14px; color: #64748b;
  pointer-events: none; transition: all 0.15s ease;
  font-family: 'Space Mono',monospace;
}
.float-label.active { top: 8px; transform: none; font-size: 10px; color: #F97316; }
.float-input.has-value ~ .float-label,
.float-input:focus ~ .float-label { top: 8px; transform: none; font-size: 10px; color: #F97316; }

/* ── Amount Input (big) ───────────────────────────────── */
.amount-input-wrap { position: relative; }
.amount-prefix {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  font-size: 28px; font-weight: 700; color: #F97316;
  font-family: 'Space Mono',monospace; pointer-events: none;
}
#balanceInput {
  width: 100%; padding: 16px 14px 16px 36px;
  background: rgba(249,115,22,0.06);
  border: 2px solid rgba(249,115,22,0.3);
  border-radius: 14px; color: #f8fafc;
  font-family: 'Space Mono',monospace; font-size: 32px; font-weight: 700;
  -webkit-appearance: none; appearance: none;
  transition: border-color 0.15s;
}
#balanceInput:focus { outline: none; border-color: #F97316; }
#balanceInput::placeholder { color: rgba(249,115,22,0.3); }

/* ── Loan Type Chips ──────────────────────────────────── */
.type-chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 12px; border-radius: 999px; font-size: 11px; font-weight: 700;
  font-family: 'Space Mono',monospace; cursor: pointer;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.04); color: #94a3b8;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
  white-space: nowrap;
}
.type-chip.active {
  background: rgba(249,115,22,0.2); border-color: rgba(249,115,22,0.5); color: #fdba74;
}

/* ── Strategy Toggle ──────────────────────────────────── */
.strategy-btn {
  flex: 1; padding: 10px 8px; border-radius: 10px; font-size: 11px; font-weight: 700;
  font-family: 'Space Mono',monospace; cursor: pointer; text-align: center;
  border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04); color: #64748b;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.strategy-btn.active {
  background: rgba(249,115,22,0.18); border-color: rgba(249,115,22,0.45); color: #fdba74;
}

/* ── Loan Cards ───────────────────────────────────────── */
.loan-card {
  padding: 14px; border-radius: 14px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07);
  cursor: pointer; transition: background 0.12s, border-color 0.12s;
  margin-bottom: 8px;
}
.loan-card:active { background: rgba(255,255,255,0.07); }
.loan-card.promo-alert { border-color: rgba(249,115,22,0.4); background: rgba(249,115,22,0.05); }
.loan-card.deleted { opacity: 0.4; }

/* ── Progress bar ─────────────────────────────────────── */
.progress-bg { height: 6px; background: rgba(255,255,255,0.08); border-radius: 999px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 999px; transition: width 0.4s ease; }

/* ── APR badge ────────────────────────────────────────── */
.apr-badge {
  display: inline-flex; align-items: center;
  padding: 2px 7px; border-radius: 999px; font-size: 10px; font-weight: 700;
  font-family: 'Space Mono',monospace;
}

/* ── Settings rows ────────────────────────────────────── */
.settings-row {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 14px; border-radius: 10px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  margin-bottom: 6px;
}

/* ── Toast ────────────────────────────────────────────── */
#toast {
  position: fixed; bottom: calc(5rem + env(safe-area-inset-bottom,0px));
  right: 1rem; z-index: 9999;
  background: #1e293b; border: 1px solid rgba(249,115,22,0.3);
  color: #f1f5f9; padding: 10px 16px; border-radius: 10px;
  font-size: 12px; font-family: 'Space Mono',monospace;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  transition: opacity 0.3s, transform 0.3s;
  pointer-events: none;
}
#toast.hidden { opacity: 0; transform: translateY(8px); }

/* ── Sheet & overlay ──────────────────────────────────── */
#overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 40; }
#sheet {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #111827; border-radius: 20px 20px 0 0;
  padding: 20px 16px calc(20px + env(safe-area-inset-bottom,0px));
  max-height: 90vh; overflow-y: auto; z-index: 50;
}
</style>

/* ════════════════════════════════════════════════════════════

const DATA_KEY    = "locaLoanData";
const META_KEY    = "locaLoanMeta";
const APP_VERSION = "1.0.0";
const ORANGE      = "#F97316";

const LOAN_TYPES = [

function todayISO() {

  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function money(v) {
  return `$${Number(v||0).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2})}`;
}

function pct(v) { return `${Number(v||0).toFixed(2)}%`; }

function showToast(msg, ms = 2200) {
  const t = $('toast');
  if (!t) return;
  t.textContent = msg;
  t.classList.remove('hidden');
  clearTimeout(showToast._tid);
  showToast._tid = setTimeout(() => t.classList.add('hidden'), ms);
}

function hexToRgba(hex, alpha) {
  if (!hex) return `rgba(100,116,139,${alpha})`;
  const h = hex.replace('#','');
  const r = parseInt(h.substring(0,2),16);
  const g = parseInt(h.substring(2,4),16);
  const b = parseInt(h.substring(4,6),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function monthsLabel(n) {
  if (!n || n <= 0) return '0 months';
  const yr = Math.floor(n / 12);
  const mo = n % 12;
  if (yr === 0) return `${mo} mo`;
  if (mo === 0) return `${yr} yr`;
  return `${yr} yr ${mo} mo`;
}

function payoffDateStr(months) {
  if (!months || months <= 0) return 'Paid off';
  const d = new Date();
  d.setMonth(d.getMonth() + months);
  return d.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
}

function getLoanType(key) {
  return LOAN_TYPES.find(t => t.key === key) || LOAN_TYPES[LOAN_TYPES.length - 1];
}

function promoAlertDays(loan) {
  if (!loan.promoAprEnds) return null;
  const end  = new Date(loan.promoAprEnds + 'T00:00:00');
  const today = new Date();
  const diff  = Math.ceil((end - today) / 86400000);
  return diff >= 0 ? diff : null;
}

/* ════════════════════════════════════════════════════════
   AMORTIZATION MATH
════════════════════════════════════════════════════════ */

// Calculates months to payoff a single loan at a given payment
function calcPayoffMonths(balance, aprPct, payment, promoApr, promoAprEnds) {
  if (balance <= 0) return 0;
  let bal = balance;
  const today = new Date();
  let month = 0;
  while (bal > 0.01 && month < 600) {
    month++;
    const currentDate = new Date(today.getFullYear(), today.getMonth() + month - 1, 1);
    const apr = _effectiveApr({ apr: aprPct, promoApr, promoAprEnds }, currentDate);
    const rate = (apr / 100) / 12;
    const interest = bal * rate;
    const pmt = Math.max(payment, interest + 0.01);
    bal = Math.max(0, bal - (pmt - interest));
  }
  return month;
}

// Full amortization table for a single loan
function buildAmortTable(loan) {
  const rows = [];
  let bal = loan.balance;
  const today = new Date();
  let month = 0;
  while (bal > 0.005 && month < 600) {
    month++;
    const currentDate = new Date(today.getFullYear(), today.getMonth() + month - 1, 1);
    const apr = _effectiveApr(loan, currentDate);
    const rate = (apr / 100) / 12;
    const interest = bal * rate;
    const minPmt = Math.max(loan.minimumPayment || 25, interest + 0.01);
    const pmt = Math.min(minPmt, bal + interest);
    const principal = pmt - interest;
    bal = Math.max(0, bal - principal);
    rows.push({
      month,
      date: currentDate.toLocaleDateString('en-US', { month: 'short', year: 'numeric' }),
      payment: pmt,
      principal,
      interest,
      balance: bal,
      apr,
    });
  }
  return rows;
}

// Multi-loan strategy simulation
function simulateStrategy(loans, extra, strategy) {
  if (!loans.length) return { months: 0, totalInterest: 0, payoffByLoanId: {} };
  const sorted = strategy === 'avalanche'
    ? [...loans].sort((a,b) => b.apr - a.apr)
    : [...loans].sort((a,b) => a.balance - b.balance);

  const balances = {};
  loans.forEach(l => balances[l.id] = parseFloat(l.balance) || 0);
  let totalInterest = 0;
  const payoffByLoanId = {};
  let month = 0;
  const today = new Date();

  while (Object.values(balances).some(b => b > 0.01) && month < 600) {
    month++;
    const currentDate = new Date(today.getFullYear(), today.getMonth() + month - 1, 1);

    // Step 1: accrue interest on all active loans
    loans.forEach(l => {
      if (balances[l.id] <= 0) return;
      const apr = _effectiveApr(l, currentDate);
      const interest = balances[l.id] * (apr / 100 / 12);
      totalInterest += interest;
      balances[l.id] += interest;
    });

    // Step 2: apply minimums to all loans, collect rollover
    let rollover = parseFloat(extra) || 0;
    loans.forEach(l => {
      if (balances[l.id] <= 0) return;
      const pmt = Math.min(parseFloat(l.minimumPayment) || 25, balances[l.id]);
      balances[l.id] -= pmt;
      if (balances[l.id] <= 0.005) {
        rollover += Math.max(0, -balances[l.id]);
        balances[l.id] = 0;
        if (!payoffByLoanId[l.id]) payoffByLoanId[l.id] = month;
      }
    });

    // Step 3: apply extra + rollover to target loan in strategy order
    for (const l of sorted) {
      if (balances[l.id] > 0.01) {
        const pmt = Math.min(rollover, balances[l.id]);
        if (pmt > 0) {
          balances[l.id] -= pmt;
          rollover -= pmt;
          if (balances[l.id] <= 0.005) {
            rollover += Math.max(0, -balances[l.id]);
            balances[l.id] = 0;
            if (!payoffByLoanId[l.id]) payoffByLoanId[l.id] = month;
          }
        }
        if (rollover <= 0) break;
      }
    }
  }

  return { months: month, totalInterest, payoffByLoanId };
}

function _effectiveApr(loan, currentDate) {
  if (loan.promoApr != null && loan.promoApr >= 0 && loan.promoAprEnds) {
    const end = new Date(loan.promoAprEnds + 'T00:00:00');
    if (currentDate <= end) return parseFloat(loan.promoApr) || 0;
  }
  return parseFloat(loan.apr) || 0;
}

function switchTab(tab) {
  if (tab !== 'add' && !skipNextFormSave && activeTab === 'add') {
    savedFormData = readFormData();
  }
  skipNextFormSave = false;
  activeTab = tab;

  document.querySelectorAll('.tab[data-tab]').forEach(btn => {
    const active = btn.dataset.tab === tab;
    btn.style.color = active ? ORANGE : '';
  });

  if      (tab === 'dashboard') renderDashboard();
  else if (tab === 'add')       renderAdd(editModeLoan);
  else if (tab === 'loans')     renderLoans();
  else if (tab === 'settings')  renderSettings();
}

function setStrategy(s) {
  const data = loadData();
  if (!data.strategies) data.strategies = {};
  data.strategies.active = s;
  saveData(data);
  // Update buttons
  document.querySelectorAll('.strategy-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.strategy === s);
  });
  // Refresh strategy summary
  if (activeTab === 'dashboard') renderDashboard();
  else if (activeTab === 'loans') renderLoans();
  updateBannerTotal();
}

function setExtraMonthly(val) {
  const data = loadData();
  if (!data.strategies) data.strategies = {};
  data.strategies.extraMonthly = parseFloat(val) || 0;
  saveData(data);
  // Debounced re-render
  clearTimeout(setExtraMonthly._tid);
  setExtraMonthly._tid = setTimeout(() => {
    if (activeTab === 'dashboard') renderDashboard();
    else if (activeTab === 'loans') renderLoans();
    updateBannerTotal();
  }, 400);
}

          </div>
          <div id="promoFields" class="${_hasPromo ? '' : 'hidden'}">
            <div class="grid grid-cols-2 gap-3 mt-2">
              <div class="float-wrap">
                <input id="promoAprInput" type="number" inputmode="decimal" step="0.01" min="0" max="200"
                  class="float-input ${fPromoApr !== '' ? 'has-value' : ''}"
                  placeholder="" value="${fPromoApr}" oninput="updateLabel('promoAprLabel')" />
                <label id="promoAprLabel" class="float-label ${fPromoApr !== '' ? 'active' : ''}">Promo APR (%)</label>
              </div>
              <div class="float-wrap">
                <input id="promoEndInput" type="date" class="float-input ${fPromoEnd ? 'has-value' : ''}"
                  value="${fPromoEnd}" onchange="updateLabel('promoEndLabel')" />
                <label id="promoEndLabel" class="float-label ${fPromoEnd ? 'active' : ''}">Promo Ends</label>
              </div>
            </div>
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" class="w-full py-3 rounded-xl text-sm font-bold text-white mb-3"
          style="background:${ORANGE};font-family:'Space Mono',monospace">
          ${isEdit ? 'Save Changes' : 'Add Loan'}
        </button>

        ${isEdit ? `
        <button type="button" onclick="cancelEdit()"
          class="w-full py-3 rounded-xl text-sm font-bold text-gray-400"
          style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);font-family:'Space Mono',monospace">
          Cancel
        </button>` : ''}

      </form>
    </div>`;

  setTimeout(() => { const b = $('balanceInput'); if (b && !isEdit) b.focus(); }, 80);
}

function selectLoanType(key) {
  _selectedType = key;
  const t = getLoanType(key);
  document.querySelectorAll('.type-chip').forEach(chip => {
    const isActive = chip.dataset.type === key;
    chip.classList.toggle('active', isActive);
    chip.style.background  = isActive ? hexToRgba(t.color, 0.2) : '';
    chip.style.borderColor = isActive ? hexToRgba(t.color, 0.5) : '';
    chip.style.color       = isActive ? t.color : '';
  });
}

function togglePromo() {
  _hasPromo = !_hasPromo;
  const btn = $('promoToggleBtn');
  const fields = $('promoFields');
  if (btn) {
    btn.style.background = _hasPromo ? ORANGE : '#374151';
    btn.querySelector('span').style.transform = `translateX(${_hasPromo ? '20px' : '4px'})`;
  }
  if (fields) fields.classList.toggle('hidden', !_hasPromo);
}

function readFormData() {
  const balance = $('balanceInput');
  if (!balance) return null;
  return {
    label:           $('labelInput')?.value.trim() || '',
    type:            _selectedType || 'credit_card',
    balance:         parseFloat($('balanceInput')?.value) || 0,
    originalBalance: parseFloat($('origBalInput')?.value) || 0,
    apr:             parseFloat($('aprInput')?.value) || 0,
    minimumPayment:  parseFloat($('minPmtInput')?.value) || 0,
    openedDate:      $('openedInput')?.value || todayISO(),
    hasPromo:        _hasPromo,
    promoApr:        _hasPromo ? (parseFloat($('promoAprInput')?.value) ?? 0) : null,
    promoAprEnds:    _hasPromo ? ($('promoEndInput')?.value || '') : '',
  };
}

function saveLoan(e) {
  e.preventDefault();
  const fd = readFormData();
  if (!fd) return;
  if (!fd.label) { showToast('Enter a loan name'); return; }
  if (!fd.balance || fd.balance <= 0) { showToast('Enter a balance'); return; }
  if (!fd.apr && fd.apr !== 0) { showToast('Enter an APR'); return; }
  if (!fd.minimumPayment || fd.minimumPayment <= 0) { showToast('Enter a minimum payment'); return; }

  const data = loadData();
  const now  = Date.now();

  if (editModeLoan) {
    const idx = data.loans.findIndex(x => x.id === editModeLoan.id && x.createdAt === editModeLoan.createdAt);
    if (idx >= 0) {
      data.loans[idx] = {
        ...data.loans[idx],
        label:           fd.label,
        type:            fd.type,
        balance:         fd.balance,
        originalBalance: fd.originalBalance || fd.balance,
        apr:             fd.apr,
        minimumPayment:  fd.minimumPayment,
        openedDate:      fd.openedDate,
        promoApr:        fd.promoApr,
        promoAprEnds:    fd.promoAprEnds,
        updatedAt:       now,
      };
    }
    editModeLoan = null;
    showToast('Loan updated');
  } else {
    const loan = {
      id:              generateId(),
      label:           fd.label,
      type:            fd.type,
      balance:         fd.balance,
      originalBalance: fd.originalBalance || fd.balance,
      apr:             fd.apr,
      minimumPayment:  fd.minimumPayment,
      openedDate:      fd.openedDate,
      promoApr:        fd.promoApr,
      promoAprEnds:    fd.promoAprEnds,
      deleted:         false,
      createdAt:       now,
      updatedAt:       now,
    };
    data.loans.push(loan);
    showToast('Loan added');
  }

  saveData(data);
  savedFormData    = null;
  skipNextFormSave = true;
  _hasPromo        = false;
  switchTab('loans');
}

function cancelEdit() {
  editModeLoan = null;
  switchTab('loans');
}

/* ════════════════════════════════════════════════════════
   LOANS TAB
════════════════════════════════════════════════════════ */
function renderLoans() {
  const data     = loadData();
  const all      = data.loans || [];
  const strategy = (data.strategies && data.strategies.active) || 'avalanche';
  const extra    = parseFloat((data.strategies && data.strategies.extraMonthly) || 0);

  const active  = all.filter(l => !l.deleted && (parseFloat(l.balance)||0) > 0);
  const paid    = all.filter(l => !l.deleted && (parseFloat(l.balance)||0) <= 0);
  const deleted = all.filter(l => l.deleted);

  // Sort by strategy order
  const sorted = strategy === 'avalanche'
    ? [...active].sort((a,b) => b.apr - a.apr)
    : [...active].sort((a,b) => a.balance - b.balance);

  // Simulate to get payoff months per loan
  let simResult = null;
  if (active.length) {
    simResult = simulateStrategy(active, extra, strategy);
  }

  let html = `
    <div class="px-4 pt-4 pb-2">
      <div class="flex items-center justify-between mb-3">
        <span class="text-xs text-gray-500">${active.length} active loan${active.length === 1 ? '' : 's'}</span>
        <button onclick="switchTab('add')" class="text-xs font-bold px-3 py-1.5 rounded-lg"
          style="background:rgba(249,115,22,0.15);color:#fdba74;border:1px solid rgba(249,115,22,0.25);font-family:'Space Mono',monospace">+ Add</button>
      </div>`;

  if (active.length === 0) {
    html += `<div class="text-center py-12">
      <div class="mb-2 flex justify-center"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#F97316" stroke-width="1.5" opacity="0.6"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg></div>
      <div class="text-sm text-gray-500">No active loans.</div>
      <button onclick="switchTab('add')" class="mt-4 px-4 py-2 rounded-xl text-xs font-bold text-white" style="background:${ORANGE};font-family:'Space Mono',monospace">Add one now</button>
    </div>`;
  } else {
    sorted.forEach((loan, idx) => {
      const t          = getLoanType(loan.type || 'other');
      const days       = promoAlertDays(loan);
      const hasAlert   = days !== null && days <= 60;
      const payoffMo   = simResult && simResult.payoffByLoanId[loan.id];
      const origBal    = parseFloat(loan.originalBalance) || parseFloat(loan.balance);
      const progressPct = origBal > 0 ? Math.min(100, ((origBal - loan.balance) / origBal) * 100) : 0;
      const stratOrder = idx + 1; // 1 = first target of extra payment

      html += `
        <div class="loan-card ${hasAlert ? 'promo-alert' : ''}" onclick="showLoanDetail('${loan.id}',${loan.createdAt})">
          <div class="flex items-start justify-between mb-2">
            <div class="flex items-center gap-2 flex-1 min-w-0">
              ${stratOrder === 1 ? `<span class="text-xs font-bold px-1.5 py-0.5 rounded flex-shrink-0" style="background:rgba(249,115,22,0.2);color:#fdba74;font-family:'Space Mono',monospace">TARGET</span>` : `<span class="text-xs text-gray-600 flex-shrink-0">#${stratOrder}</span>`}
              <span class="text-sm font-bold text-gray-100 truncate">${loan.label}</span>
            </div>
            <div class="text-right flex-shrink-0 ml-2">
              <div class="text-base font-bold" style="color:#f1f5f9">${money(loan.balance)}</div>
            </div>
          </div>
          <div class="flex items-center gap-2 mb-2 flex-wrap">
            <span class="apr-badge" style="background:${hexToRgba(t.color,0.15)};color:${t.color};border:1px solid ${hexToRgba(t.color,0.3)}">${t.label}</span>
            ${loan.promoAprEnds && days !== null ? `<span class="apr-badge" style="background:rgba(249,115,22,0.15);color:#fdba74;border:1px solid rgba(249,115,22,0.3)">${pct(loan.promoApr)} → ${pct(loan.apr)}</span>` : `<span class="apr-badge" style="background:rgba(255,255,255,0.05);color:#94a3b8;border:1px solid rgba(255,255,255,0.08)">${pct(loan.apr)} APR</span>`}
            <span class="text-xs text-gray-500">Min ${money(loan.minimumPayment)}/mo</span>
          </div>
          ${progressPct > 0 ? `
          <div class="mb-2">
            <div class="flex justify-between text-xs text-gray-600 mb-1">
              <span>${progressPct.toFixed(0)}% paid off</span>
              ${payoffMo ? `<span style="color:#fdba74">${payoffDateStr(payoffMo)}</span>` : ''}
            </div>
            <div class="progress-bg"><div class="progress-fill" style="width:${progressPct}%;background:${t.color}"></div></div>
          </div>` : payoffMo ? `<div class="text-xs text-gray-500 mb-1">Payoff: <span style="color:#fdba74">${payoffDateStr(payoffMo)}</span></div>` : ''}
          ${hasAlert ? `<div class="text-xs mt-1" style="color:#fdba74">⚠ Promo APR expires in ${days} day${days===1?'':'s'}</div>` : ''}
        </div>`;
    });

    if (paid.length) {
      html += `<div class="text-xs text-gray-600 uppercase tracking-widest mt-4 mb-2" style="font-family:'Space Mono',monospace">Paid Off</div>`;
      paid.forEach(loan => {
        const t = getLoanType(loan.type || 'other');
        html += `
          <div class="loan-card" style="opacity:0.5" onclick="showLoanDetail('${loan.id}',${loan.createdAt})">
            <div class="flex items-center gap-2">
              <span class="text-xs font-bold px-1.5 py-0.5 rounded" style="background:rgba(16,185,129,0.2);color:#34d399">✓ PAID</span>
              <span class="text-sm text-gray-400 truncate">${loan.label}</span>
              <span class="apr-badge ml-auto" style="background:${hexToRgba(t.color,0.1)};color:${t.color}">${t.label}</span>
            </div>
          </div>`;
      });
    }
  }

  html += '</div>';
  $('app').innerHTML = html;
  updateBannerTotal();
}

function showLoanDetail(id, createdAt) {

  const t     = getLoanType(loan.type || 'other');

      </div>

      <!-- Summary -->
      <div class="rounded-xl p-4 mb-4" style="background:${hexToRgba(t.color,0.08)};border:1px solid ${hexToRgba(t.color,0.2)}">
        <div class="text-2xl font-bold mb-1" style="color:#f8fafc;font-family:'Space Mono',monospace">${money(loan.balance)}</div>
        <div class="text-sm font-bold mb-1 text-gray-300">${loan.label}</div>
        <div class="flex flex-wrap gap-2 mb-2">
          <span class="apr-badge" style="background:${hexToRgba(t.color,0.15)};color:${t.color};border:1px solid ${hexToRgba(t.color,0.3)}">${t.label}</span>
          <span class="apr-badge" style="background:rgba(255,255,255,0.05);color:#94a3b8">${pct(loan.apr)} APR</span>
          <span class="apr-badge" style="background:rgba(255,255,255,0.05);color:#94a3b8">Min ${money(loan.minimumPayment)}/mo</span>
        </div>
        ${days !== null ? `<div class="text-xs" style="color:#fdba74">Promo: ${pct(loan.promoApr)} until ${loan.promoAprEnds} → ${days} days left</div>` : ''}
      </div>

      <!-- Payoff summary -->
      <div class="grid grid-cols-2 gap-2 mb-4">

          <table style="width:100%;border-collapse:collapse">

              <tr style="border-bottom:1px solid rgba(255,255,255,0.1)">

              </tr>

function startEditLoan(id, createdAt) {
  const data = loadData();
  const loan = data.loans.find(x => x.id === id && x.createdAt === createdAt);
  if (!loan) return;
  editModeLoan = loan;
  _selectedType = loan.type || 'credit_card';
  _hasPromo = !!(loan.promoAprEnds);
  closeSheet();
  switchTab('add');
}

function deleteLoan(id, createdAt) {
  const data = loadData();
  const idx  = data.loans.findIndex(x => x.id === id && x.createdAt === createdAt);
  if (idx >= 0) {
    data.loans[idx].deleted   = true;
    data.loans[idx].updatedAt = Date.now();
    saveData(data);
    showToast('Loan removed');
  }
  closeSheet();
  renderLoans();
}

function restoreLoan(id, createdAt) {
  const data = loadData();
  const idx  = data.loans.findIndex(x => x.id === id && x.createdAt === createdAt);
  if (idx >= 0) {
    data.loans[idx].deleted   = false;
    data.loans[idx].updatedAt = Date.now();
    saveData(data);
    showToast('Loan restored');
  }
  closeSheet();
  renderLoans();
}

/* ════════════════════════════════════════════════════════

  let comparison = '';
  if (loans.length) {
    const avRes = simulateStrategy(loans, extra, 'avalanche');
    const sbRes = simulateStrategy(loans, extra, 'snowball');
    const saved = Math.abs(avRes.totalInterest - sbRes.totalInterest);
    comparison = `
      <div class="rounded-xl p-3 mb-4" style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07)">

  }

  $('sheet').innerHTML = `
    <div>
      <div class="flex items-center justify-between mb-4">
        <span class="text-sm font-bold text-gray-200" style="font-family:'Space Mono',monospace">Payoff Strategy</span>
        <button onclick="closeSheet()" style="color:#64748b;font-size:18px;background:none;border:none;cursor:pointer">×</button>

      <button onclick="setStrategy('avalanche');closeSheet()" class="w-full text-left px-4 py-3 rounded-xl mb-2 text-sm"
        style="background:${strategy==='avalanche'?'rgba(249,115,22,0.15)':'rgba(255,255,255,0.04)'};border:1px solid ${strategy==='avalanche'?'rgba(249,115,22,0.35)':'rgba(255,255,255,0.07)'};color:${strategy==='avalanche'?'#fdba74':'#94a3b8'};font-family:'Space Mono',monospace">
        Avalanche — Highest APR first ${strategy==='avalanche'?' ✓':''}
      </button>
      <button onclick="setStrategy('snowball');closeSheet()" class="w-full text-left px-4 py-3 rounded-xl mb-4 text-sm"
        style="background:${strategy==='snowball'?'rgba(139,92,246,0.15)':'rgba(255,255,255,0.04)'};border:1px solid ${strategy==='snowball'?'rgba(139,92,246,0.35)':'rgba(255,255,255,0.07)'};color:${strategy==='snowball'?'#c4b5fd':'#94a3b8'};font-family:'Space Mono',monospace">

        <input id="sheetExtraInput" type="number" inputmode="decimal" min="0" step="10" value="${extra}"

          style="padding:12px 12px 12px 26px;background:rgba(249,115,22,0.06);border-color:rgba(249,115,22,0.25);font-family:'Space Mono',monospace;font-size:18px;font-weight:700"
          oninput="setExtraMonthly(this.value)" />
      </div>
    </div>`;
  openSheet();

          <div><div class="text-sm text-gray-200">Import</div><div class="text-xs text-gray-500">Restore from a JSON backup</div></div>

          <div><div class="text-sm text-red-400">Clear All Data</div><div class="text-xs text-gray-500">Permanently delete all loans</div></div>

      <div>

          <div><div class="text-sm text-gray-200">LocaLabor</div><div class="text-xs text-gray-500">Income tracker</div></div>
          <svg class="w-4 h-4 text-gray-600 ml-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        </button>
        <button onclick="window.location.href='/Loss/'" class="settings-row w-full text-left">
          <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="#F43F5E" viewBox="0 0 24 24" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
          <div><div class="text-sm text-gray-200">LocaLoss</div><div class="text-xs text-gray-500">Spending tracker</div></div>

      <div class="text-center text-xs text-gray-700 py-2" style="font-family:'Space Mono',monospace">
        LocaLoan v${APP_VERSION} · LocaLedger Suite
      </div>
    </div>`;

  updateBannerTotal();
}

/* ── Export / Import ──────────────────────────────────── */
function exportData() {
  const json = JSON.stringify(loadData(), null, 2);
  if (navigator.share) {
    navigator.share({ title: 'LocaLoan Backup', text: json }).catch(() => _copyExport(json));
  } else {
    _copyExport(json);
  }
}

function _copyExport(text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard')).catch(() => _fallbackCopy(text));
  } else {
    _fallbackCopy(text);
  }
}

function _fallbackCopy(text) {
  $('sheet').innerHTML = `
    <div>
      <div class="flex items-center justify-between mb-4">
        <span class="text-sm font-bold text-gray-200" style="font-family:'Space Mono',monospace">Export Data</span>
        <button onclick="closeSheet()" style="color:#64748b;font-size:18px;background:none;border:none;cursor:pointer">×</button>
      </div>
      <textarea class="w-full h-48 p-3 text-xs rounded-xl bg-gray-800 border border-gray-700 text-gray-300"
        style="font-family:'Space Mono',monospace" readonly>${text}</textarea>
      <p class="text-xs text-gray-500 mt-2">Select all and copy to back up your loans.</p>
    </div>`;
  openSheet();
}

function showImport() {
  $('sheet').innerHTML = `
    <div>
      <div class="flex items-center justify-between mb-4">
        <span class="text-sm font-bold text-gray-200" style="font-family:'Space Mono',monospace">Import Data</span>
        <button onclick="closeSheet()" style="color:#64748b;font-size:18px;background:none;border:none;cursor:pointer">×</button>
      </div>
      <p class="text-xs text-gray-400 mb-3">Paste a LocaLoan JSON backup. Loans will be merged by ID.</p>
      <textarea id="importArea" class="w-full h-40 p-3 text-xs rounded-xl bg-gray-800 border border-gray-700 text-gray-300 mb-3"
        style="font-family:'Space Mono',monospace" placeholder='{"loans":[...]}'></textarea>
      <button onclick="importData()"
        class="w-full py-3 rounded-xl text-sm font-bold text-white"
        style="background:${ORANGE};font-family:'Space Mono',monospace">Import</button>
    </div>`;
  openSheet();
}

function importData() {
  try {
    const raw     = $('importArea')?.value;
    const parsed  = JSON.parse(raw);
    const current = loadData();
    const existingIds = new Set((current.loans||[]).map(l => l.id));
    const newLoans    = (parsed.loans||[]).filter(l => !existingIds.has(l.id));
    current.loans = [...(current.loans||[]), ...newLoans];
    // Merge strategies if present
    if (parsed.strategies) {
      current.strategies = { ...current.strategies, ...parsed.strategies };
    }
    // Advance nextId
    const allIds = current.loans.map(l => {
      const parts = l.id?.split('_');
      return parts ? parseInt(parts[parts.length-1]) : 0;
    }).filter(n => !isNaN(n));
    if (allIds.length) {
      const m = loadMeta();
      m.nextId = Math.max(m.nextId, Math.max(...allIds) + 1);
      saveMeta(m);
    }
    saveData(current);
    closeSheet();
    showToast(`Imported ${newLoans.length} loan${newLoans.length===1?'':'s'}`);
    renderSettings();
  } catch(err) {
    showToast('Invalid JSON — check your backup');
  }
}

function confirmClearAll() {
  $('sheet').innerHTML = `
    <div>
      <div class="flex items-center justify-between mb-4">
        <span class="text-sm font-bold text-red-400" style="font-family:'Space Mono',monospace">Clear All Data</span>
        <button onclick="closeSheet()" style="color:#64748b;font-size:18px;background:none;border:none;cursor:pointer">×</button>
      </div>
      <p class="text-sm text-gray-400 mb-6">This will permanently delete all loans and reset your strategy settings. This cannot be undone.</p>
      <button onclick="_clearAllConfirmed()" class="w-full py-3 rounded-xl text-sm font-bold text-white mb-2"
        style="background:#ef4444;font-family:'Space Mono',monospace">Yes, Delete Everything</button>
      <button onclick="closeSheet()" class="w-full py-3 rounded-xl text-sm text-gray-400"
        style="font-family:'Space Mono',monospace">Cancel</button>
    </div>`;
  openSheet();
}

function _clearAllConfirmed() {
  localStorage.removeItem(DATA_KEY);
  localStorage.removeItem(META_KEY);
  initStorage();
  closeSheet();
  showToast('All data cleared');
  switchTab('dashboard');
}

/* ════════════════════════════════════════════════════════
   SUITE LAUNCHER & DRUM
════════════════════════════════════════════════════════ */
const SUITE_MODULES = [
  { id:'labor',  label:'Labor',  color:'#6366F1' },
  { id:'loss',   label:'Loss',   color:'#F43F5E' },
  { id:'limit',  label:'Limit',  color:'#F59E0B' },
  { id:'loan',   label:'Loan',   color:'#F97316' },
  { id:'legacy', label:'Legacy', color:'#10B981' },
  { id:'liquid', label:'Liquid', color:'#06B6D4' },
];

/* ── Suite auth helpers ─────────────────────────── */
const _IS_DEV_APP = ['localhost','127.0.0.1'].includes(location.hostname);
const _LAUNCH_URL  = _IS_DEV_APP
  ? `${location.protocol}//${location.hostname}${location.port?':'+location.port:''}/Launch/`
  : 'https://launch.n8.wtf';
function _getLocaAuth() { try { return JSON.parse(localStorage.getItem('locaAuth')||'null'); } catch { return null; } }
function _hasSuiteAccess() { const a=_getLocaAuth(); return a&&(a.subscription==='suite'||a.subscription==='bundle'); }

const DRUM_FACE_H   = 44;
let _activeModule   = 'loan';
let _drumStep       = 3; // start on face 3 (Loan)
let _drumIdx        = 3;
let _launcherOpen   = false;
let _drumHovering   = false;
let _drumInterval   = null;

function initSuiteDrum() {
  _applyFaceColors();
  const drum = $('suiteDrum');
  if (drum) {
    drum.style.transition = 'none';
    drum.style.transform  = `translateY(-${_drumIdx * DRUM_FACE_H}px)`;
    requestAnimationFrame(() => { if (drum) drum.style.transition = ''; });
  }
  const btn = $('suiteLaunchBtn');
  if (btn) {
    btn.addEventListener('mouseenter', () => { _drumHovering = true;  _startDrum(); });
    btn.addEventListener('mouseleave', () => { _drumHovering = false; if (!_launcherOpen) { _stopDrum(); _settleDrum(); } });
  }
}

function _applyFaceColors() {
  document.querySelectorAll('.suite-face').forEach((el, i) => {
    el.style.color = SUITE_MODULES[i % 6].color;
  });
}

function _settleDrum() {
  const faceIdx = SUITE_MODULES.findIndex(m => m.id === _activeModule);
  if (faceIdx < 0) return;
  const drum = $('suiteDrum');
  if (!drum) return;
  drum.style.transition = 'none';
  _drumStep = faceIdx; _drumIdx = faceIdx;
  drum.style.transform = `translateY(-${faceIdx * DRUM_FACE_H}px)`;
  requestAnimationFrame(() => { if (drum) drum.style.transition = ''; });
}

function _startDrum() { if (!_drumInterval) _drumInterval = setInterval(_drumAdvance, 3200); }
function _stopDrum()  { clearInterval(_drumInterval); _drumInterval = null; }

function _drumAdvance() {
  _drumStep++;
  _drumIdx = _drumStep % 6;
  const drum = $('suiteDrum');
  if (!drum) return;
  drum.style.transition = '';
  if (_drumStep % 6 === 0 && _drumStep > 0) {
    drum.style.transform = `translateY(-${_drumStep * DRUM_FACE_H}px)`;
    setTimeout(() => {
      drum.style.transition = 'none';
      _drumStep = 0; _drumIdx = 0;
      drum.style.transform = 'translateY(0)';
      requestAnimationFrame(() => { if (drum) drum.style.transition = ''; });
    }, 520);
  } else {
    drum.style.transform = `translateY(-${_drumStep * DRUM_FACE_H}px)`;
  }
}

function toggleSuiteLauncher() {
  if (_launcherOpen) { closeSuiteLauncher(); return; }
  _launcherOpen = true;
  const panel = $('suiteLauncher');
  if (panel) panel.classList.remove('hidden');
  const chevron = $('suiteChevron');
  if (chevron) chevron.style.transform = 'rotate(180deg)';
  _startDrum();
  setTimeout(() => { document.addEventListener('click', _outsideClickHandler, { once: true }); }, 50);
}

function closeSuiteLauncher() {
  _launcherOpen = false;
  const panel = $('suiteLauncher');
  if (panel) panel.classList.add('hidden');
  const chevron = $('suiteChevron');
  if (chevron) chevron.style.transform = '';
  if (!_drumHovering) { _stopDrum(); _settleDrum(); }
}

function _outsideClickHandler(evt) {
  const panel = $('suiteLauncher');
  const btn   = $('suiteLaunchBtn');
  if (panel && !panel.contains(evt.target) && btn && !btn.contains(evt.target)) {
    closeSuiteLauncher();
  }
}

function switchSuiteModule(id) {
  closeSuiteLauncher();
  // Gate suite-required apps
  if (id === 'limit' && !_hasSuiteAccess()) {
    window.location.href = _LAUNCH_URL;
    return;
  }
  _activeModule = id;

  SUITE_MODULES.forEach(m => {
    const btn = $(`suiteBtn-${m.id}`);
    if (btn) btn.classList.toggle('active', m.id === id);
  });

  const faceIdx = SUITE_MODULES.findIndex(m => m.id === id);
  if (faceIdx >= 0) {
    const drum = $('suiteDrum');
    if (drum) {
      drum.style.transition = 'transform 0.4s cubic-bezier(0.4,0,0.2,1)';
      _drumStep = faceIdx; _drumIdx = faceIdx;
      drum.style.transform = `translateY(-${faceIdx * DRUM_FACE_H}px)`;
      setTimeout(() => { if (drum) { drum.style.transition = 'none'; requestAnimationFrame(() => { if(drum) drum.style.transition=''; }); } }, 420);
    }
  }

  const APP_URLS = {
    labor:  '/Labor/',
    loss:   '/Loss/',
    limit:  '/Limit/?from=loan',
    legacy: '/Legacy/?from=loan',
    liquid: '/Liquid/?from=loan',
  };

  if (id === 'loan') {
    switchTab('dashboard');
  } else if (APP_URLS[id]) {
    window.location.href = APP_URLS[id];
  }
}

/* ════════════════════════════════════════════════════════
   PWA / SERVICE WORKER
════════════════════════════════════════════════════════ */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').then(reg => {
      reg.addEventListener('updatefound', () => {
        const nw = reg.installing;
        if (!nw) return;
        nw.addEventListener('statechange', () => {
          if (nw.state === 'installed' && navigator.serviceWorker.controller) {
            _showUpdateBanner(nw);
          }
        });
      });
    });
  });
}

function _showUpdateBanner(worker) {
  const banner = document.createElement('div');
  banner.style.cssText = `position:fixed;bottom:calc(5rem + env(safe-area-inset-bottom,0px));left:1rem;right:1rem;z-index:9998;background:#1e293b;border:1px solid rgba(249,115,22,0.4);border-radius:12px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;font-family:'Space Mono',monospace;font-size:12px;color:#f1f5f9;box-shadow:0 4px 20px rgba(0,0,0,0.5)`;
  banner.innerHTML = `<span style="color:#94a3b8">Update available</span><button id="updateNowBtn" style="background:${ORANGE};color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:11px;font-weight:700;font-family:'Space Mono',monospace;cursor:pointer">Update Now</button>`;
  document.body.appendChild(banner);
  banner.querySelector('#updateNowBtn').addEventListener('click', () => {
    worker.postMessage({ type: 'SKIP_WAITING' });
    navigator.serviceWorker.addEventListener('controllerchange', () => location.reload());
  });
}

/* ════════════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  // Auth gate — Suite/Bundle required
  const _gateAuth = _getLocaAuth();
  if (!_gateAuth) { window.location.replace(_LAUNCH_URL); return; }
  if (!_hasSuiteAccess()) { window.location.replace(_LAUNCH_URL + '?goto=pricing'); return; }

  initSuiteDrum();
  updateBannerTotal();

  document.querySelectorAll('.tab[data-tab]').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });

  switchTab('dashboard');
});
</script>
